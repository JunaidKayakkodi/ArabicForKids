const LESSONS = RAW_DATA.map((d, index) => {
  const c = COLORS[index % COLORS.length];
  return {
    id: index + 1,
    letter: d.l,
    title: d.t,
    ...c,
    animal: { word: d.an[0], english: d.an[1], icon: d.an[2] },
    everyday: [
      { word: d.ev[0][0], english: d.ev[0][1], icon: d.ev[0][2] },

    harakat: d.h.map((hItem, hIdx) => {
      let shape = '';
      if(hIdx === 0) shape = 'َ';
      else if(hIdx === 1) shape = 'ِ';
      else shape = 'ُ';
      
      return {
        sound: hItem[0], label: hItem[1], example: hItem[2], quran: hItem[3], shape: shape
      }
    }),
    nasheed: d.n
  };
});

// --- AUDIO LOGIC ---
function playSound(text, btnElement) {
    if(btnElement) {
        btnElement.classList.add('scale-95');
        setTimeout(() => btnElement.classList.remove('scale-95'), 150);
    }

    if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
    }
    window.speechSynthesis.cancel();

    const speakText = () => {
        if ('speechSynthesis' in window) {
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            const arabicVoice = voices.find(voice => voice.lang.includes('ar'));
            if (arabicVoice) utterance.voice = arabicVoice;
            utterance.lang = 'ar-SA'; 
            utterance.rate = 0.8; 
            utterance.pitch = 1.2; 
            window.speechSynthesis.speak(utterance);
        }
    };

    try {
        const audioUrl = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=ar&client=tw-ob`;
        currentAudio = new Audio(audioUrl);
        currentAudio.play().catch(error => {
            speakText(); 
        });
    } catch (e) {
        speakText(); 
    }
}

window.speechSynthesis.onvoiceschanged = () => {
    window.speechSynthesis.getVoices();
};

function triggerVibration() {
    if (navigator.vibrate) {
        navigator.vibrate([100, 50, 100]);
    }
}

// --- LOGIC: DRAG AND DROP GAME ---
let completedDrops = 0;

function initDragAndDrop() {
    const lesson = LESSONS[currentLessonIdx];
    const container = document.getElementById('draggables-container');
    const overlay = document.getElementById('drag-success-overlay');
    const dropzones = document.querySelectorAll('.dropzone');

    overlay.classList.remove('flex');
    completedDrops = 0;

    dropzones.forEach(dz => {
        dz.innerHTML = `<span class="text-5xl md:text-6xl font-bold arabic-text text-gray-300 absolute inset-0 flex items-center justify-center pointer-events-none">${lesson.letter}</span>`;
        dz.classList.remove('bg-green-50', 'border-green-400', 'draggable-placed');
        dz.classList.add('border-gray-300', 'border-dashed');
    });

    let draggablesData = lesson.harakat.map((h, idx) => ({ idx: idx, shape: h.shape }));
    draggablesData = draggablesData.sort(() => Math.random() - 0.5);

    container.innerHTML = draggablesData.map(d => `
        <div class="draggable w-16 h-16 md:w-20 md:h-20 bg-white shadow-md border-2 border-indigo-200 rounded-xl flex items-center justify-center text-4xl md:text-5xl font-bold arabic-text text-indigo-600 hover:scale-110 hover:shadow-lg transition-transform z-20" 
             draggable="true" 
             data-idx="${d.idx}" 
             id="drag-${d.idx}">
            <span class="pointer-events-none leading-none">&#x25CC;${d.shape}</span>
        </div>
    `).join('');

    setupDragEvents();
}

function setupDragEvents() {
    const draggables = document.querySelectorAll('.draggable');
    const dropzones = document.querySelectorAll('.dropzone');
    
    let draggedItem = null;
    let initialTransform = '';

    draggables.forEach(draggable => {
        draggable.addEventListener('dragstart', (e) => {
            draggedItem = draggable;
            setTimeout(() => draggable.classList.add('is-dragging'), 0);
            e.dataTransfer.setData('text/plain', draggable.dataset.idx);
        });

        draggable.addEventListener('dragend', () => {
            draggable.classList.remove('is-dragging');
            draggedItem = null;
        });
    });

    dropzones.forEach(zone => {
        zone.addEventListener('dragover', (e) => {
            e.preventDefault();
            if(!zone.classList.contains('draggable-placed')) {
                zone.classList.add('dragover');
            }
        });

        zone.addEventListener('dragleave', () => {
            zone.classList.remove('dragover');
        });

        zone.addEventListener('drop', (e) => {
            e.preventDefault();
            zone.classList.remove('dragover');
            const draggedIdx = e.dataTransfer.getData('text/plain');
            handleDrop(zone, draggedIdx, document.querySelector(`[data-idx="${draggedIdx}"]`));
        });
    });

    draggables.forEach(draggable => {
        draggable.addEventListener('touchstart', (e) => {
            draggedItem = draggable;
            const touch = e.touches[0];
            initialTransform = draggable.style.transform;
            draggable.style.position = 'absolute';
            draggable.style.zIndex = '100';
            document.body.appendChild(draggable);
            moveElement(draggable, touch.clientX, touch.clientY);
        }, {passive: false});

        draggable.addEventListener('touchmove', (e) => {
            e.preventDefault(); 
            if (!draggedItem) return;
            const touch = e.touches[0];
            moveElement(draggedItem, touch.clientX, touch.clientY);
            
            dropzones.forEach(zone => {
                const rect = zone.getBoundingClientRect();
                if (touch.clientX >= rect.left && touch.clientX <= rect.right &&
                    touch.clientY >= rect.top && touch.clientY <= rect.bottom) {
                    if(!zone.classList.contains('draggable-placed')) zone.classList.add('dragover');
                } else {
                    zone.classList.remove('dragover');
                }
            });
        }, {passive: false});

        draggable.addEventListener('touchend', (e) => {
            if (!draggedItem) return;
            const touch = e.changedTouches[0];
            let droppedOnValidZone = false;

            dropzones.forEach(zone => {
                const rect = zone.getBoundingClientRect();
                if (touch.clientX >= rect.left && touch.clientX <= rect.right &&
                    touch.clientY >= rect.top && touch.clientY <= rect.bottom) {
                    
                    if(!zone.classList.contains('draggable-placed')) {
                        handleDrop(zone, draggedItem.dataset.idx, draggedItem, true);
                        droppedOnValidZone = true;
                    }
                }
                zone.classList.remove('dragover');
            });

            if (!droppedOnValidZone) {
                draggedItem.style.position = 'relative';
                draggedItem.style.left = 'auto';
                draggedItem.style.top = 'auto';
                draggedItem.style.transform = initialTransform;
                document.getElementById('draggables-container').appendChild(draggedItem);
            }
            draggedItem = null;
        });
    });
}

function moveElement(el, clientX, clientY) {
    el.style.left = (clientX - el.offsetWidth / 2) + 'px';
    el.style.top = (clientY - el.offsetHeight / 2) + 'px';
}

function handleDrop(zone, draggedIdx, element, isTouch = false) {
    const targetIdx = zone.dataset.correctIdx;
    const targetIdxNumber = parseInt(targetIdx, 10);
    const draggedIdxNumber = parseInt(draggedIdx, 10);
    
    if (draggedIdxNumber === targetIdxNumber) {
        playSound('صَحِيح', null);
        const lesson = LESSONS[currentLessonIdx];
        
        zone.innerHTML = `
            <span class="text-5xl md:text-6xl font-bold arabic-text text-indigo-600 absolute inset-0 flex items-center justify-center pointer-events-none animate-pop">${lesson.harakat[targetIdxNumber].sound}</span>
            <span class="absolute -top-4 -right-4 text-yellow-400 animate-bounce-star z-50"><i data-lucide="star" class="w-10 h-10 fill-current"></i></span>
        `;
        
        zone.classList.add('bg-green-50', 'border-green-400', 'draggable-placed');
        zone.classList.remove('border-gray-300', 'border-dashed');
        
        element.remove(); 
        lucide.createIcons();
        
        setTimeout(() => { playSound(lesson.harakat[targetIdxNumber].sound, null); }, 800);

        completedDrops++;
        if (completedDrops === 3) {
            setTimeout(() => {
                const overlay = document.getElementById('drag-success-overlay');
                overlay.classList.remove('hidden');
                overlay.classList.add('flex');
                playSound('مُمْتَاز', null); 
            }, 1000);
        }
    } else {
        triggerVibration();
        zone.classList.add('border-red-400', 'bg-red-50');
        setTimeout(() => {
            zone.classList.remove('border-red-400', 'bg-red-50');
        }, 500);

        if (isTouch) {
            element.style.position = 'relative';
            element.style.left = 'auto';
            element.style.top = 'auto';
            document.getElementById('draggables-container').appendChild(element);
        }
    }
}

// --- LOGIC: HIDEN AND SEEK ---
function initHideAndSeekGame() {
    const lesson = LESSONS[currentLessonIdx];
    const container = document.getElementById('hide-and-seek-container');
    
    const correctWords = [lesson.animal.word, lesson.everyday[0].word];
    const wrongWords = [];
    
    while(wrongWords.length < 3) {
      const randomWord = ALL_WORDS[Math.floor(Math.random() * ALL_WORDS.length)];
      if (!stripHarakat(randomWord).includes(stripHarakat(lesson.letter)) && !wrongWords.includes(randomWord)) {
        wrongWords.push(randomWord);
      }
    }
    
    const gameWords = [
      ...correctWords.map(w => ({ word: w, hasLetter: true })), 
      ...wrongWords.map(w => ({ word: w, hasLetter: false }))
    ].sort(() => Math.random() - 0.5);

    container.innerHTML = gameWords.map((item, index) => `
        <button id="hs-btn-${index}" data-correct="${item.hasLetter}" onclick="handleHideSeekClick(${index}, ${item.hasLetter}, '${lesson.accent}')"
            class="relative text-2xl sm:text-4xl font-bold arabic-text p-4 sm:p-6 rounded-2xl shadow-sm border-2 transition-all duration-300 transform bg-white text-gray-800 hover:bg-gray-50 border-gray-200" dir="rtl">
            ${item.word}
        </button>
    `).join('');
}

function handleHideSeekClick(index, isCorrect, accentClass) {
    const btn = document.getElementById(`hs-btn-${index}`);
    if (btn.disabled) return;
    
    if (isCorrect) {
        btn.className = `relative text-2xl sm:text-4xl font-bold arabic-text p-4 sm:p-6 rounded-2xl shadow-sm border-2 transition-all duration-300 transform ${accentClass} text-white border-transparent scale-110`;
        btn.disabled = true;
        btn.innerHTML += `<span class="absolute -top-3 -right-3 text-yellow-400 animate-bounce-star"><i data-lucide="star" class="w-8 h-8 fill-current"></i></span>`;
        lucide.createIcons();
        playSound('صَحِيح', null); 
    } else {
        triggerVibration(); 
        btn.className = `relative text-2xl sm:text-4xl font-bold arabic-text p-4 sm:p-6 rounded-2xl shadow-sm border-2 transition-all duration-300 transform bg-gray-100 text-gray-400 border-gray-200 opacity-50`;
        btn.disabled = true;
    }
}

// --- LOGIC: CANVAS SMART GRID VALIDATION ---
function initCanvas() {
    const canvas = document.getElementById('drawing-canvas');
    const targetCanvas = document.getElementById('target-canvas');
    if (!canvas || !targetCanvas) return;
    
    canvasCtx = canvas.getContext('2d');
    const targetCtx = targetCanvas.getContext('2d');
    const rect = canvas.getBoundingClientRect();
    
    canvas.width = rect.width * 2;
    canvas.height = rect.height * 2;
    targetCanvas.width = rect.width * 2;
    targetCanvas.height = rect.height * 2;
    
    canvasCtx.scale(2, 2);
    canvasCtx.lineCap = 'round';
    canvasCtx.lineJoin = 'round';
    canvasCtx.lineWidth = 24; 
    canvasCtx.strokeStyle = '#4F46E5'; 

    targetCtx.scale(2, 2);
    targetCtx.clearRect(0, 0, rect.width, rect.height);
    targetCtx.textAlign = 'center';
    targetCtx.textBaseline = 'middle';
    
    const isSmallScreen = window.innerWidth < 640;
    const fontSize = isSmallScreen ? 180 : 250;
    targetCtx.font = `bold ${fontSize}px "Noto Kufi Arabic", sans-serif`;
    targetCtx.fillStyle = '#E5E7EB'; 
    
    const centerX = rect.width / 2;
    const centerY = rect.height / 2;
    targetCtx.fillText(LESSONS[currentLessonIdx].letter, centerX, centerY + (fontSize * 0.1));

    canvas.onmousedown = startDrawing;
    canvas.onmousemove = draw;
    canvas.onmouseup = stopDrawing;
    canvas.onmouseleave = stopDrawing;
    
    canvas.ontouchstart = (e) => { e.preventDefault(); startDrawing(e); };
    canvas.ontouchmove = (e) => { e.preventDefault(); draw(e); };
    canvas.ontouchend = stopDrawing;
}

function showDrawingError(msg) {
    triggerVibration();
    const canvasContainer = document.getElementById('canvas-container');
    const prompt = document.getElementById('drawing-prompt');
    const promptIcon = document.getElementById('prompt-icon');
    const promptText = document.getElementById('prompt-text');
    
    canvasContainer.classList.add('border-red-400');
    
    if(prompt && promptIcon && promptText) {
        prompt.classList.replace('bg-indigo-100', 'bg-red-100');
        prompt.classList.replace('text-indigo-700', 'text-red-700');
        prompt.classList.replace('border-indigo-100', 'border-red-200');
        promptIcon.innerText = '❌';
        promptIcon.classList.remove('animate-bounce');
        promptText.innerText = msg;
        
        setTimeout(() => {
            prompt.classList.replace('bg-red-100', 'bg-indigo-100');
            prompt.classList.replace('text-red-700', 'text-indigo-700');
            prompt.classList.replace('border-red-200', 'border-indigo-100');
            promptIcon.innerText = '✏️';
            promptIcon.classList.add('animate-bounce');
            promptText.innerText = 'Teacher Prompt: "Trace the letter carefully!"';
        }, 3000);
    }
    
    setTimeout(() => canvasContainer.classList.remove('border-red-400'), 500);
}

function checkDrawingStrict() {
    const canvas = document.getElementById('drawing-canvas');
    if (!canvas) return;

    const ctx = canvas.getContext('2d');
    const width = canvas.width;
    const height = canvas.height;
    const rect = canvas.getBoundingClientRect();

    const userData = ctx.getImageData(0, 0, width, height).data;
    
    const hiddenCanvas = document.createElement('canvas');
    hiddenCanvas.width = width;
    hiddenCanvas.height = height;
    const hiddenCtx = hiddenCanvas.getContext('2d');
    
    hiddenCtx.scale(2, 2);
    hiddenCtx.textAlign = 'center';
    hiddenCtx.textBaseline = 'middle';
    const isSmallScreen = window.innerWidth < 640;
    const fontSize = isSmallScreen ? 180 : 250;
    hiddenCtx.font = `bold ${fontSize}px "Noto Kufi Arabic", sans-serif`;
    
    const centerX = rect.width / 2;
    const centerY = rect.height / 2;
    
    // 1. FAT HITBOX (Checks if they drew outside the lines)
    hiddenCtx.lineJoin = 'round';
    hiddenCtx.lineCap = 'round';
    hiddenCtx.lineWidth = 70; // Extremely forgiving fat boundary
    hiddenCtx.strokeStyle = 'black';
    hiddenCtx.strokeText(LESSONS[currentLessonIdx].letter, centerX, centerY + (fontSize * 0.1));
    hiddenCtx.fillStyle = 'black';
    hiddenCtx.fillText(LESSONS[currentLessonIdx].letter, centerX, centerY + (fontSize * 0.1));
    const fatData = hiddenCtx.getImageData(0, 0, width, height).data;

    // 2. NORMAL HITBOX (Used to map out the required grid path)
    hiddenCtx.clearRect(0, 0, width, height);
    hiddenCtx.fillText(LESSONS[currentLessonIdx].letter, centerX, centerY + (fontSize * 0.1));
    const normalData = hiddenCtx.getImageData(0, 0, width, height).data;

    let userPixels = 0;
    let userInsideFat = 0;
    
    // Smart Grid System (25px blocks) perfectly verifies path tracking
    const CELL_SIZE = 25; 
    const targetZones = new Set();
    const userZones = new Set();

    for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
            const i = (y * width + x) * 4 + 3;
            const hasUser = userData[i] > 10;
            const hasTarget = normalData[i] > 10;
            
            if (hasUser) {
                userPixels++;
                if (fatData[i] > 10) userInsideFat++;
                userZones.add(Math.floor(x / CELL_SIZE) + ',' + Math.floor(y / CELL_SIZE));
            }
            
            if (hasTarget) {
                targetZones.add(Math.floor(x / CELL_SIZE) + ',' + Math.floor(y / CELL_SIZE));
            }
        }
    }

    if (userPixels < 200) {
        showDrawingError("Draw the letter first!");
        return;
    }

    // Mathematical calculations
    const precision = userInsideFat / userPixels;
    
    let hitZones = 0;
    targetZones.forEach(z => {
        if (userZones.has(z)) hitZones++;
    });
    const coverage = hitZones / targetZones.size;

    // Smart Validation Rules
    if (coverage < 0.78) { 
        // A single pen stroke easily hits 85-95% of the zones. If it's under 78%, they definitely skipped a dot!
        showDrawingError("You missed a part! Make sure to trace the whole shape and dots.");
    } else if (precision < 0.40) { 
        // Highly forgiving of loops overlapping, but rejects massive screen scribbling
        showDrawingError("A bit messy! Try to stay on the gray marks.");
    } else {
        // Passed both tests!
        const overlay = document.getElementById('draw-success-overlay');
        if (overlay) {
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            playSound('مُمْتَاز', null); 
        }
    }
}

function resetDrawing() {
    clearCanvas();
    const overlay = document.getElementById('draw-success-overlay');
    if (overlay) {
        overlay.classList.add('hidden');
        overlay.classList.remove('flex');
    }
}

function clearCanvas() {
    const canvas = document.getElementById('drawing-canvas');
    if(canvas && canvasCtx) {
        canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
    }
}

function getCoords(e, canvas) {
    const rect = canvas.getBoundingClientRect();
    let clientX = e.touches ? e.touches[0].clientX : e.clientX;
    let clientY = e.touches ? e.touches[0].clientY : e.clientY;
    
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;

    return {
        x: (clientX - rect.left) * scaleX / 2,
        y: (clientY - rect.top) * scaleY / 2
    };
}

function startDrawing(e) {
    isDrawing = true;
    const canvas = document.getElementById('drawing-canvas');
    const coords = getCoords(e, canvas);
    canvasCtx.beginPath();
    canvasCtx.moveTo(coords.x, coords.y);
}

function draw(e) {
    if (!isDrawing) return;
    const canvas = document.getElementById('drawing-canvas');
    const coords = getCoords(e, canvas);
    canvasCtx.lineTo(coords.x, coords.y);
    canvasCtx.stroke();
}

function stopDrawing() {
    isDrawing = false;
}

// --- NAVIGATION ---
function changeLesson(idx) {
    currentLessonIdx = idx;
    currentTab = 0;
    scrollArea.scrollTop = 0;
    updateAll();
}

function changeTab(idx) {
    currentTab = idx;
    scrollArea.scrollTop = 0;
    updateAll();
}

function updateButtons() {
    btnPrev.disabled = currentLessonIdx === 0;
    btnNext.disabled = currentLessonIdx === LESSONS.length - 1;
    
    if(btnPrev.disabled) btnPrev.className = "flex items-center gap-1 md:gap-2 px-4 py-2 md:px-6 md:py-3 rounded-full font-bold transition-colors text-sm md:text-base opacity-50 cursor-not-allowed bg-gray-100 text-gray-400";
    else btnPrev.className = "flex items-center gap-1 md:gap-2 px-4 py-2 md:px-6 md:py-3 rounded-full font-bold transition-colors text-sm md:text-base bg-gray-100 text-gray-700 hover:bg-gray-200";

    if(btnNext.disabled) btnNext.className = "flex items-center gap-1 md:gap-2 px-4 py-2 md:px-6 md:py-3 rounded-full font-bold transition-colors text-sm md:text-base opacity-50 cursor-not-allowed bg-gray-100 text-gray-400";
    else btnNext.className = "flex items-center gap-1 md:gap-2 px-4 py-2 md:px-6 md:py-3 rounded-full font-bold transition-colors text-sm md:text-base bg-indigo-600 text-white hover:bg-indigo-700 shadow-md";
}

btnPrev.addEventListener('click', () => {
    if (currentLessonIdx > 0) changeLesson(currentLessonIdx - 1);
});

btnNext.addEventListener('click', () => {
    if (currentLessonIdx < LESSONS.length - 1) changeLesson(currentLessonIdx + 1);
});

window.addEventListener('resize', () => {
    if(currentTab === 2) {
        setTimeout(initCanvas, 150);
    }
});

function updateAll() {
    renderSidebar();
    renderTabs();
    renderMainContent();
    updateButtons();
}

// --- INIT ---
updateAll();

</script>
