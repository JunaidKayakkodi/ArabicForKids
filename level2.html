// --- AUDIO LOGIC ---
function playSound(text, btnElement) {
    if(btnElement) {
        btnElement.classList.add('scale-95');
        setTimeout(() => {
            if(document.body.contains(btnElement)) btnElement.classList.remove('scale-95');
        }, 150);
    }
    if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
    window.speechSynthesis.cancel();

    const speakText = () => {
        if ('speechSynthesis' in window) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ar-SA'; utterance.rate = 0.7; utterance.pitch = 1.2; 
            window.speechSynthesis.speak(utterance);
        }
    };
    try {
        const audioUrl = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=ar&client=tw-ob`;
        currentAudio = new Audio(audioUrl);
        currentAudio.play().catch(() => speakText());
    } catch (e) { speakText(); }
}

function triggerVib() { if (navigator.vibrate) navigator.vibrate([100, 50, 100]); }

// --- REVIEW GAME ---
let currentReviewTarget = null;
function initReviewGame() {
    const reviewOpts = document.getElementById('review-options');
    if (!reviewOpts) return;
    const l = LESSONS[currentLessonIdx];
    currentReviewTarget = l.items[Math.floor(Math.random() * l.items.length)];
    const options = [...l.items].sort(() => Math.random() - 0.5).slice(0, 3);
    if(!options.includes(currentReviewTarget)) options[0] = currentReviewTarget;
    options.sort(() => Math.random() - 0.5);

    reviewOpts.innerHTML = options.map((opt) => `
        <button onclick="checkReview('${opt.char}', this)" class="bg-white border-2 border-gray-200 px-8 py-6 rounded-2xl shadow-sm text-5xl font-black arabic-text hover:border-indigo-400 hover:scale-105 transition-all">${opt.char}</button>
    `).join('');
    setTimeout(() => {if(document.getElementById('review-options')) playSound(currentReviewTarget.sound, null);}, 500);
}
window.playTargetSound = () => { if (currentReviewTarget) playSound(currentReviewTarget.sound, null); }
window.checkReview = (char, btn) => {
    if(char === currentReviewTarget.char) {
        playSound('صَحِيح', null);
        btn.classList.replace('border-gray-200', 'border-green-500'); btn.classList.add('bg-green-50');
        setTimeout(() => { if (document.getElementById('review-options')) initReviewGame(); }, 1500);
    } else {
        triggerVib();
        btn.classList.replace('border-gray-200', 'border-red-500');
        setTimeout(() => { if (document.body.contains(btn)) btn.classList.replace('border-red-500', 'border-gray-200'); }, 500);
    }
}

// --- TRICKY SOUNDS GAME ---
let currentTrickyIdx = 0;
let currentTrickyTarget = {};
function initTrickyGame() {
    const area = document.getElementById('tricky-game-area');
    if(!area) return;
    const l = LESSONS[currentLessonIdx];
    const item = l.items[currentTrickyIdx];
    
    // Pick word 1 or word 2 randomly
    const isFirst = Math.random() < 0.5;
    currentTrickyTarget = {
        ans: isFirst ? item.l1 : item.l2,
        word: isFirst ? item.w1 : item.w2,
        icon: isFirst ? item.i1 : item.i2
    };
    
    const options = [item.l1, item.l2].sort(() => Math.random() - 0.5);
    
    area.innerHTML = `
        <div class="text-7xl mb-6">${currentTrickyTarget.icon}</div>
        <button onclick="playSound('${currentTrickyTarget.word}', this)" class="mx-auto bg-indigo-100 text-indigo-600 p-6 rounded-full hover:scale-110 transition-transform mb-12 shadow-sm"><i data-lucide="volume-2" class="w-10 h-10"></i></button>
        <div class="flex justify-center gap-6" id="tricky-opts">
            ${options.map(opt => `<button onclick="checkTricky('${opt}', this)" class="bg-gray-50 border-4 border-gray-200 w-24 h-24 rounded-3xl text-5xl font-black arabic-text text-gray-700 hover:border-indigo-400 transition-all">${opt}</button>`).join('')}
        </div>
        <div id="tricky-success" class="hidden absolute inset-0 bg-white/95 z-50 flex-col items-center justify-center rounded-[3rem]">
            <h2 class="text-5xl font-black text-indigo-600 mb-6 arabic-text">${currentTrickyTarget.word}</h2>
            <button onclick="nextTricky()" class="px-8 py-3 bg-indigo-600 text-white font-bold rounded-full shadow-lg">Next Word</button>
        </div>
    `;
    lucide.createIcons();
    setTimeout(() => {if(document.getElementById('tricky-game-area')) playSound(currentTrickyTarget.word, null);}, 500);
}
window.checkTricky = (val, btn) => {
    if(val === currentTrickyTarget.ans) {
        playSound('صَحِيح', null);
        btn.classList.replace('border-gray-200', 'border-green-500'); btn.classList.replace('text-gray-700', 'text-green-600');
        setTimeout(() => {
            const suc = document.getElementById('tricky-success');
            if(suc) suc.classList.replace('hidden', 'flex');
        }, 1000);
    } else {
        triggerVib();
        btn.classList.replace('border-gray-200', 'border-red-500');
        setTimeout(() => { if (document.body.contains(btn)) btn.classList.replace('border-red-500', 'border-gray-200'); }, 500);
    }
}
window.nextTricky = () => { currentTrickyIdx = (currentTrickyIdx + 1) % LESSONS[currentLessonIdx].items.length; initTrickyGame(); }

// --- SHADDAH GAME ---
let currentShaddahIdx = 0;
function initShaddahGame() {
    const shaddahArea = document.getElementById('shaddah-game-area');
    if (!shaddahArea) return;

    const l = LESSONS[currentLessonIdx];
    const item = l.items[currentShaddahIdx];
    
    let html = `
        <div class="text-4xl md:text-6xl font-black arabic-text text-gray-800 mb-12 flex justify-center items-center gap-4" dir="rtl">
            <span class="text-gray-400">${item.parts[0]} + ${item.parts[1]}</span>
            <span class="text-gray-400">=</span>
            <div class="dropzone w-20 h-24 md:w-24 md:h-28 border-4 border-dashed border-gray-300 rounded-2xl bg-gray-50 flex items-center justify-center" data-ans="${item.joined}" data-tts="${item.tts}"></div>
        </div>
        <div class="flex justify-center gap-6 flex-wrap" id="draggables-container" dir="rtl">
            ${[...l.items].sort(() => Math.random() - 0.5).map((opt) => `
                <div class="draggable bg-rose-50 border-2 border-rose-200 w-16 h-16 md:w-20 md:h-20 rounded-xl flex items-center justify-center text-4xl md:text-5xl font-black arabic-text text-rose-600 hover:scale-110 z-20 touch-none" draggable="true" data-val="${opt.joined}">${opt.joined}</div>
            `).join('')}
        </div>
        <div id="shaddah-success" class="hidden absolute inset-0 bg-white/95 z-50 flex-col items-center justify-center rounded-3xl">
            <h2 class="text-4xl font-black text-green-500 mb-6 arabic-text">مُمْتَاز!</h2>
            <button onclick="nextShaddah()" class="px-8 py-3 bg-rose-500 text-white font-bold rounded-full shadow-lg">Next</button>
        </div>
    `;
    shaddahArea.innerHTML = html;
    setupDraggables((zone, val, el) => {
        if(zone.dataset.ans === val) {
            playSound(zone.dataset.tts, null);
            zone.innerHTML = `<span class="text-6xl font-black arabic-text text-green-600 animate-pop">${val}</span>`;
            zone.classList.replace('border-dashed', 'border-solid');
            zone.classList.replace('border-gray-300', 'border-green-400');
            el.remove();
            setTimeout(() => {
                const successEl = document.getElementById('shaddah-success');
                if(successEl) successEl.classList.replace('hidden', 'flex');
            }, 1000);
            return true;
        } else {
            triggerVib(); zone.classList.add('bg-red-50', 'border-red-400');
            setTimeout(() => { if (document.body.contains(zone)) zone.classList.remove('bg-red-50', 'border-red-400'); }, 500);
            return false; 
        }

// --- UNIVERSAL DRAG & DROP ENGINE ---
function setupDraggables(dropHandler) {
    const draggables = document.querySelectorAll('.draggable');
    const dropzones = document.querySelectorAll('.dropzone');
    let draggedItem = null; let initialTransform = '';

    draggables.forEach(d => {
        d.addEventListener('dragstart', (e) => {
            draggedItem = d; setTimeout(() => d.classList.add('is-dragging'), 0); e.dataTransfer.setData('text/plain', d.dataset.val);
        });
        d.addEventListener('dragend', () => { d.classList.remove('is-dragging'); draggedItem = null; });
        
        d.addEventListener('touchstart', (e) => {
            draggedItem = d; initialTransform = d.style.transform; d.style.position = 'absolute'; d.style.zIndex = '100';
            document.body.appendChild(d); moveEl(d, e.touches[0].clientX, e.touches[0].clientY);
        }, {passive: false});

        d.addEventListener('touchmove', (e) => {
            e.preventDefault(); if (!draggedItem) return; const touch = e.touches[0];
            moveEl(draggedItem, touch.clientX, touch.clientY);
            dropzones.forEach(z => {
                const r = z.getBoundingClientRect();
                if (touch.clientX >= r.left && touch.clientX <= r.right && touch.clientY >= r.top && touch.clientY <= r.bottom) {
                    if(z.dataset.filled !== "true" && !z.classList.contains('draggable-placed')) z.classList.add('dragover');
                } else z.classList.remove('dragover');
            });
        }, {passive: false});

        d.addEventListener('touchend', (e) => {
            if (!draggedItem) return; const touch = e.changedTouches[0]; let dropped = false;
            dropzones.forEach(z => {
                const r = z.getBoundingClientRect();
                if (touch.clientX >= r.left && touch.clientX <= r.right && touch.clientY >= r.top && touch.clientY <= r.bottom) {
                    if(z.dataset.filled !== "true" && !z.classList.contains('draggable-placed')) { dropped = dropHandler(z, draggedItem.dataset.val, draggedItem); }
                }
                z.classList.remove('dragover');
            });
            if (!dropped) {
                draggedItem.style.position = 'relative'; draggedItem.style.left = 'auto'; draggedItem.style.top = 'auto';
                draggedItem.style.transform = initialTransform;
                const container = document.getElementById('draggables-container');
                if(container) container.appendChild(draggedItem);
            }
            draggedItem = null;
        });
    });

    dropzones.forEach(z => {
        z.addEventListener('dragover', (e) => { e.preventDefault(); if(z.dataset.filled !== "true" && !z.classList.contains('draggable-placed')) z.classList.add('dragover'); });
        z.addEventListener('dragleave', () => z.classList.remove('dragover'));
        z.addEventListener('drop', (e) => {
            e.preventDefault(); z.classList.remove('dragover'); const val = e.dataTransfer.getData('text/plain');
            const el = document.querySelector(`.draggable[data-val="${val}"]`);
            if(el) dropHandler(z, val, el);
        });
    });
}
function moveEl(el, x, y) { el.style.left = (x - el.offsetWidth/2) + 'px'; el.style.top = (y - el.offsetHeight/2) + 'px'; }

// --- NAVIGATION ---
window.changeLesson = function(idx) { 
    currentLessonIdx = idx; currentTab = 0; 
    const scrollArea = document.getElementById('main-scroll-area'); if(scrollArea) scrollArea.scrollTop = 0; 
    if (currentAudio) { currentAudio.pause(); }
    updateAll(); 
}
window.changeTab = function(idx) { 
    currentTab = idx; 
    const scrollArea = document.getElementById('main-scroll-area'); if(scrollArea) scrollArea.scrollTop = 0; 
    updateAll(); 
}
window.prevLesson = function() { if (currentLessonIdx > 0) changeLesson(currentLessonIdx - 1); }
window.nextLesson = function() { if (currentLessonIdx < LESSONS.length - 1) changeLesson(currentLessonIdx + 1); }

function updateButtons() {
    const btnPrev = document.getElementById('btn-prev'); const btnNext = document.getElementById('btn-next');
    if(btnPrev) { btnPrev.disabled = currentLessonIdx === 0; btnPrev.style.opacity = currentLessonIdx === 0 ? '0.5' : '1'; btnPrev.style.cursor = currentLessonIdx === 0 ? 'not-allowed' : 'pointer'; }
    if(btnNext) { btnNext.disabled = currentLessonIdx === LESSONS.length - 1; btnNext.style.opacity = currentLessonIdx === LESSONS.length - 1 ? '0.5' : '1'; btnNext.style.cursor = currentLessonIdx === LESSONS.length - 1 ? 'not-allowed' : 'pointer'; }
}

function updateAll() { renderSidebar(); renderTabs(); renderMainContent(); updateButtons(); }

// --- INIT ---
updateAll();

</script>
